<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <title>Etch A Sketch</title>
</head>
<body>
    <h1>Etch a Sketch</h1>
    <div id="CC">
        <div id="gridContainer"></div>
        <button id="resetButton">Clear</button>
    </div>
    <button class="b4x4 btn">4x4</button>
    <button class="b8x8 btn">8x8</button>
    <button class="b16x16 btn">16x16</button>
    <button class="b32x32 btn">32x32</button>
    <button class="b64x64 btn">64x64</button>
    <button class="optional btn">Choose Your Size</button>
    
    
</body>
</html>
